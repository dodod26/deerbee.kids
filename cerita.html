<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerita Anak DeerBee</title>
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
 
<p class="page-hello" id="pageHello"></p>
<script>
(function(){
const n = localStorage.getItem('deerbee_name');
if(n){
const el = document.getElementById('pageHello');
if(el) el.textContent = '👋 Halo, ' + n + '!';
}
})();
</script>
<h1>📚 Cerita Anak DeerBee</h1>
<p class="page-subtitle">Pilih cerita yang ingin dibaca</p>
 
<a class="menu" href="stories/milo-detektif.html">
📖 Milo Si Kucing Detektif
</a>
 
<a class="btn-back" href="index.html">
🏠 Kembali ke Beranda
</a>
 
<audio id="bgMusic" src="assets/musik/bgm.mp3" loop></audio>
<button id="musicToggle" onclick="toggleMusic()">🔇</button>
 
<script>
const audio = document.getElementById('bgMusic');
const btn = document.getElementById('musicToggle');
let playing = false;
 
function onPlaySuccess(){
btn.textContent = '🎵';
btn.style.animation = 'none';
playing = true;
}
 
function startMusic(){
if(!playing){
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

function toggleMusic(){
  if(playing){
    audio.pause();
    btn.textContent = '🔇';
    btn.style.animation = 'musicBounce 1.4s ease-in-out infinite';
    playing = false;
    localStorage.setItem('deerbee_music', 'off');
  }else{
    audio.play().then(onPlaySuccess).catch(()=>{});
    localStorage.setItem('deerbee_music', 'on');
  }
}

if(localStorage.getItem('deerbee_music') !== 'off'){
  startMusic();
}
</script>
</body>
</html>
