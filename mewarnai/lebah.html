<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mewarnai Lebah - DeerBee</title>
<link rel="stylesheet" href="../css/coloring.css">
</head>
<body>
<h1>🐝 Mewarnai Lebah Lucu</h1>

<div class="canvas-box">
<svg id="beeSvg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

<!-- Sayap -->
<ellipse id="wingLeft" class="paintable" cx="110" cy="110" rx="35" ry="50" fill="#ffffff"/>
<ellipse id="wingRight" class="paintable" cx="190" cy="110" rx="35" ry="50" fill="#ffffff"/>

<!-- Badan -->
<ellipse id="body" class="paintable" cx="150" cy="170" rx="70" ry="80" fill="#ffffff"/>

<!-- Garis-garis badan (stripe) -->
<rect id="stripe1" class="paintable" x="95" y="140" width="110" height="20" fill="#ffffff"/>
<rect id="stripe2" class="paintable" x="90" y="175" width="120" height="20" fill="#ffffff"/>
<rect id="stripe3" class="paintable" x="95" y="210" width="110" height="20" fill="#ffffff"/>

<!-- Mata -->
<circle cx="130" cy="160" r="8" fill="#333" stroke="none"/>
<circle cx="170" cy="160" r="8" fill="#333" stroke="none"/>

<!-- Antena -->
<line x1="135" y1="100" x2="120" y2="70" stroke="#333" stroke-width="3"/>
<line x1="165" y1="100" x2="180" y2="70" stroke="#333" stroke-width="3"/>
<circle cx="120" cy="70" r="5" fill="#333" stroke="none"/>
<circle cx="180" cy="70" r="5" fill="#333" stroke="none"/>

<!-- Senyum -->
<path d="M 135 195 Q 150 210 165 195" fill="none" stroke="#333" stroke-width="3"/>

</svg>
</div>

<div class="palette" id="palette">
<div class="color-dot" style="background:#ffe066" data-color="#ffe066"></div>
<div class="color-dot" style="background:#333333" data-color="#333333"></div>
<div class="color-dot" style="background:#ff8fb3" data-color="#ff8fb3"></div>
<div class="color-dot" style="background:#7ec8f2" data-color="#7ec8f2"></div>
<div class="color-dot" style="background:#9be7a3" data-color="#9be7a3"></div>
<div class="color-dot" style="background:#ffffff" data-color="#ffffff"></div>
</div>

<div class="action-buttons">
<button onclick="resetColors()">🔄 Ulangi</button>
</div>

<a class="btn-back" href="../mewarnai.html">⬅ Kembali</a>

<audio id="bgMusic" src="../assets/musik/bgm.mp3" loop></audio>
<button id="musicToggle" onclick="toggleMusic()">🔇</button>

<script>
let selectedColor = "#ffe066";

const dots = document.querySelectorAll('.color-dot');
dots.forEach(dot=>{
dot.addEventListener('click', ()=>{
dots.forEach(d=>d.classList.remove('selected'));
dot.classList.add('selected');
selectedColor = dot.dataset.color;
});
});
dots[0].classList.add('selected');

const shapes = document.querySelectorAll('.paintable');
shapes.forEach(shape=>{
shape.addEventListener('click', ()=>{
shape.setAttribute('fill', selectedColor);
});
});

function resetColors(){
shapes.forEach(shape=>{
shape.setAttribute('fill', '#ffffff');
});
}

const audio = document.getElementById('bgMusic');
const btn = document.getElementById('musicToggle');
let playing = false;

function onPlaySuccess(){
btn.textContent = '🎵';
btn.style.animation = 'none';
playing = true;
}

function startMusic(){
if(!playing){
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

function toggleMusic(){
if(playing){
audio.pause();
btn.textContent = '🔇';
btn.style.animation = 'musicBounce 1.4s ease-in-out infinite';
playing = false;
}else{
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

window.addEventListener('load', startMusic);
document.addEventListener('click', startMusic, { once:true });
</script>
</body>
</html>
