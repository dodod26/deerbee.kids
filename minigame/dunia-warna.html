<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunia Warna - DeerBee</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/coloring.css">
<style>
.game-wrap{
max-width:460px;
margin:0 auto;
}

/* ===== Setup ===== */
.mode-options{
display:flex;
flex-direction:column;
gap:16px;
max-width:360px;
margin:0 auto 10px;
}

.mode-card{
display:flex;
align-items:center;
gap:14px;
background:white;
border:3px solid #ffd1e3;
border-radius:20px;
padding:16px 18px;
cursor:pointer;
transition:.2s;
text-align:left;
}

.mode-card:hover{
border-color:#ff69b4;
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(255,105,180,.25);
}

.mode-card .icon{
font-size:36px;
flex:0 0 auto;
}

.mode-card .text strong{
display:block;
font-size:18px;
color:#444;
}

.mode-card .text span{
font-size:13px;
color:#999;
}

/* ===== Score board ===== */
.score-board{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:18px;
}

.score-pill{
background:white;
border-radius:16px;
padding:8px 18px;
font-weight:bold;
font-size:15px;
color:#444;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.score-pill span{
font-size:18px;
margin-right:4px;
}

/* ===== Tebak Warna ===== */
.question-card{
background:white;
border-radius:22px;
padding:22px;
margin-bottom:22px;
box-shadow:0 6px 18px rgba(0,0,0,.1);
border:4px dashed #ffd1e3;
}

.question-card .label{
color:#999;
font-size:14px;
margin-bottom:4px;
}

.question-card .target-name{
font-size:30px;
font-weight:bold;
color:#ff69b4;
}

.color-options{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
max-width:380px;
margin:0 auto 18px;
}

.color-box{
width:100%;
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,.18);
border:4px solid white;
transition:.2s;
animation:popIn .35s ease backwards;
}

.color-box:hover{
transform:scale(1.06);
}

.color-box:active{
transform:scale(0.94);
}

.color-box.wrong-shake{
animation:shake .4s;
}

.color-box.correct-pulse{
animation:correctPulse .5s;
}

@keyframes popIn{
0%{ transform:scale(0); opacity:0; }
100%{ transform:scale(1); opacity:1; }
}

@keyframes shake{
0%,100%{ transform:translateX(0); }
25%{ transform:translateX(-8px); }
75%{ transform:translateX(8px); }
}

@keyframes correctPulse{
0%{ transform:scale(1); }
50%{ transform:scale(1.15); }
100%{ transform:scale(1); }
}

.game-feedback{
font-size:19px;
font-weight:bold;
min-height:30px;
margin-bottom:18px;
}

/* ===== Cocokkan Warna (Memory) ===== */
.memory-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
max-width:380px;
margin:0 auto 20px;
}

.memory-card{
aspect-ratio:1;
border-radius:14px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.18);
position:relative;
perspective:600px;
}

.memory-card-inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform .4s;
border-radius:14px;
}

.memory-card.flipped .memory-card-inner{
transform:rotateY(180deg);
}

.memory-face{
position:absolute;
width:100%;
height:100%;
border-radius:14px;
backface-visibility:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.memory-back{
background:linear-gradient(160deg,#ffb6d9,#ff8fc6);
font-size:26px;
}

.memory-front{
transform:rotateY(180deg);
border:3px solid white;
}

.memory-card.matched{
opacity:0.35;
pointer-events:none;
}

/* ===== Buttons ===== */
.btn-restart{
display:block;
width:fit-content;
margin:0 auto 18px;
padding:13px 30px;
border:none;
border-radius:18px;
background:linear-gradient(160deg,#ff8fc6,#ff69b4);
color:white;
font-weight:bold;
font-size:16px;
font-family:'Baloo 2',cursive;
cursor:pointer;
box-shadow:0 5px 14px rgba(255,105,180,.4);
transition:.2s;
}

.btn-restart:hover{
transform:translateY(-2px);
}

.btn-small{
padding:10px 20px;
border:2px solid #ff69b4;
border-radius:16px;
background:white;
color:#ff69b4;
font-weight:bold;
font-size:14px;
font-family:'Baloo 2',cursive;
cursor:pointer;
transition:.2s;
margin:0 6px 18px;
}

.btn-small:hover{
background:#fff0f6;
}
</style>
</head>
<body>

<div class="game-wrap">

<h1>🎨 Dunia Warna</h1>
<p class="page-subtitle" id="pageSubtitle">Pilih mode permainan</p>

<!-- ===================== -->
<!-- SETUP -->
<!-- ===================== -->
<div id="setupSection">
<div class="mode-options">
<div class="mode-card" onclick="startMode('tebak')">
<div class="icon">🎯</div>
<div class="text">
<strong>Tebak Warna</strong>
<span>Tap warna yang sesuai namanya</span>
</div>
</div>
<div class="mode-card" onclick="startMode('cocok')">
<div class="icon">🧠</div>
<div class="text">
<strong>Cocokkan Warna</strong>
<span>Buka 2 kartu, temukan pasangannya</span>
</div>
</div>
</div>
</div>

<!-- ===================== -->
<!-- TEBAK WARNA -->
<!-- ===================== -->
<div id="tebakSection" style="display:none;">

<div class="score-board">
<div class="score-pill"><span>⭐</span><span id="scoreVal">0</span></div>
<div class="score-pill"><span>🔥</span><span id="streakVal">0</span></div>
</div>

<div class="question-card">
<div class="label">Tap warna:</div>
<div class="target-name" id="targetName">Kuning</div>
</div>

<div class="color-options" id="options"></div>

<p class="game-feedback" id="feedback"></p>

<button class="btn-restart" onclick="newRoundTebak()">🔄 Soal Baru</button>
<br>
<button class="btn-small" onclick="backToSetup()">⚙️ Ganti Mode</button>

</div>

<!-- ===================== -->
<!-- COCOKKAN WARNA -->
<!-- ===================== -->
<div id="cocokSection" style="display:none;">

<div class="score-board">
<div class="score-pill"><span>🔄</span><span id="moveVal">0</span></div>
<div class="score-pill"><span>✅</span><span id="matchVal">0</span></div>
</div>

<p class="game-feedback" id="cocokFeedback">Ayo buka kartunya!</p>

<div class="memory-grid" id="memoryGrid"></div>

<button class="btn-restart" onclick="initMemory()">🔄 Acak Ulang</button>
<br>
<button class="btn-small" onclick="backToSetup()">⚙️ Ganti Mode</button>

</div>

<a class="btn-back" href="../minigame.html">⬅ Kembali</a>

</div>

<div class="confetti-layer" id="confetti"></div>

<audio id="bgMusic" src="../assets/musik/bgm.mp3" loop></audio>
<button id="musicToggle" onclick="toggleMusic()">🔇</button>

<script>
const colors = [
{name:"Kuning", code:"#ffe066"},
{name:"Pink", code:"#ff8fb3"},
{name:"Biru", code:"#7ec8f2"},
{name:"Hijau", code:"#9be7a3"},
{name:"Ungu", code:"#caa6ff"},
{name:"Oranye", code:"#ffb347"},
{name:"Merah", code:"#ff5c5c"},
{name:"Coklat", code:"#a9714c"}
];

function backToSetup(){
document.getElementById('setupSection').style.display = 'block';
document.getElementById('tebakSection').style.display = 'none';
document.getElementById('cocokSection').style.display = 'none';
document.getElementById('pageSubtitle').textContent = 'Pilih mode permainan';
}

function startMode(mode){
document.getElementById('setupSection').style.display = 'none';
if(mode === 'tebak'){
document.getElementById('tebakSection').style.display = 'block';
document.getElementById('pageSubtitle').textContent = 'Tap warna yang sesuai namanya';
newRoundTebak();
}else{
document.getElementById('cocokSection').style.display = 'block';
document.getElementById('pageSubtitle').textContent = 'Buka 2 kartu, temukan pasangannya';
initMemory();
}
}

/* ===================== TEBAK WARNA ===================== */
const praiseWords = ["🎉 Hebat!", "👏 Pintar!", "✨ Keren!", "🌟 Betul!", "😄 Asyik!"];
const tryAgainWords = ["Coba lagi yuk!", "Hampir, ayo coba lagi!", "Yuk lihat lagi warnanya!"];

let target = null;
let score = 0;
let streak = 0;

function newRoundTebak(){
document.getElementById('feedback').textContent = "";
target = colors[Math.floor(Math.random()*colors.length)];
document.getElementById('targetName').textContent = target.name;

let pool = colors.filter(c => c.name !== target.name);
pool = pool.sort(()=>Math.random()-0.5).slice(0,3);
const finalSet = [...pool, target].sort(()=>Math.random()-0.5);

const optionsBox = document.getElementById('options');
optionsBox.innerHTML = "";
finalSet.forEach((c, i)=>{
const box = document.createElement('div');
box.className = "color-box";
box.style.background = c.code;
box.style.animationDelay = (i*0.07)+'s';
box.onclick = ()=> checkAnswer(c, box);
optionsBox.appendChild(box);
});
}

function checkAnswer(c, boxEl){
const fb = document.getElementById('feedback');
if(c.name === target.name){
score += 10;
streak += 1;
document.getElementById('scoreVal').textContent = score;
document.getElementById('streakVal').textContent = streak;

fb.textContent = praiseWords[Math.floor(Math.random()*praiseWords.length)];
fb.style.color = "#2ecc71";
boxEl.classList.add('correct-pulse');
burstConfetti();

setTimeout(newRoundTebak, 1100);
}else{
streak = 0;
document.getElementById('streakVal').textContent = streak;
fb.textContent = tryAgainWords[Math.floor(Math.random()*tryAgainWords.length)];
fb.style.color = "#ff6b6b";
boxEl.classList.add('wrong-shake');
setTimeout(()=> boxEl.classList.remove('wrong-shake'), 400);
}
}

/* ===================== COCOKKAN WARNA (MEMORY) ===================== */
let flippedCards = [];
let lockBoard = false;
let moveCount = 0;
let matchCount = 0;

function initMemory(){
moveCount = 0;
matchCount = 0;
flippedCards = [];
lockBoard = false;
document.getElementById('moveVal').textContent = 0;
document.getElementById('matchVal').textContent = 0;
document.getElementById('cocokFeedback').textContent = "Ayo buka kartunya!";

const chosen = [...colors].sort(()=>Math.random()-0.5).slice(0,6);
let deck = [...chosen, ...chosen].sort(()=>Math.random()-0.5);

const grid = document.getElementById('memoryGrid');
grid.innerHTML = "";

deck.forEach((c)=>{
const card = document.createElement('div');
card.className = 'memory-card';
card.dataset.name = c.name;

const inner = document.createElement('div');
inner.className = 'memory-card-inner';

const back = document.createElement('div');
back.className = 'memory-face memory-back';
back.textContent = '❓';

const front = document.createElement('div');
front.className = 'memory-face memory-front';
front.style.background = c.code;

inner.appendChild(back);
inner.appendChild(front);
card.appendChild(inner);
card.onclick = ()=> flipCard(card);
grid.appendChild(card);
});
}

function flipCard(card){
if(lockBoard) return;
if(card.classList.contains('flipped') || card.classList.contains('matched')) return;

card.classList.add('flipped');
flippedCards.push(card);

if(flippedCards.length === 2){
moveCount++;
document.getElementById('moveVal').textContent = moveCount;
lockBoard = true;

const [a, b] = flippedCards;
if(a.dataset.name === b.dataset.name){
setTimeout(()=>{
a.classList.add('matched');
b.classList.add('matched');
matchCount++;
document.getElementById('matchVal').textContent = matchCount;
flippedCards = [];
lockBoard = false;

if(matchCount === 6){
document.getElementById('cocokFeedback').textContent = "🎉 Semua cocok! Pintar sekali!";
burstConfetti();
}else{
document.getElementById('cocokFeedback').textContent = praiseWords[Math.floor(Math.random()*praiseWords.length)];
}
}, 500);
}else{
document.getElementById('cocokFeedback').textContent = "Coba ingat-ingat lagi yuk!";
setTimeout(()=>{
a.classList.remove('flipped');
b.classList.remove('flipped');
flippedCards = [];
lockBoard = false;
}, 900);
}
}
}

/* ===================== CONFETTI ===================== */
function burstConfetti(){
const box = document.getElementById('confetti');
for(let i=0;i<40;i++){
const p = document.createElement('span');
p.className = 'confetti-piece';
p.style.left = Math.random()*100+'%';
p.style.background = ['#ff69b4','#ffe066','#7ec8f2','#9be7a3','#caa6ff'][Math.floor(Math.random()*5)];
p.style.animationDelay = (Math.random()*0.5)+'s';
box.appendChild(p);
}
setTimeout(()=>{ box.innerHTML=''; }, 2500);
}

/* ===================== MUSIK ===================== */
const audio = document.getElementById('bgMusic');
const btn = document.getElementById('musicToggle');
let playing = false;

function onPlaySuccess(){
btn.textContent = '🎵';
btn.style.animation = 'none';
playing = true;
}

function startMusic(){
if(!playing){
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

function toggleMusic(){
if(playing){
audio.pause();
btn.textContent = '🔇';
btn.style.animation = 'musicBounce 1.4s ease-in-out infinite';
playing = false;
}else{
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

window.addEventListener('load', startMusic);
document.addEventListener('click', startMusic, { once:true });
</script>
</body>
</html>
