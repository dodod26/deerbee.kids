<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mewarnai DeerBee</title>
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<h1>🎨 Mewarnai DeerBee</h1>

<div class="card">
<h2>🐝 Lebah Lucu</h2>
<p>Segera hadir</p>
</div>

<div class="card">
<h2>🌈 Pelangi Ceria</h2>
<p>Segera hadir</p>
</div>

<div class="card">
<h2>🐰 Kelinci Imut</h2>
<p>Segera hadir</p>
</div>

<a class="btn-back" href="index.html">⬅ Kembali</a>

<audio id="bgMusic" src="assets/musik/bgm.mp3" loop></audio>
<button id="musicToggle" onclick="toggleMusic()">🔇</button>

<script>
const audio = document.getElementById('bgMusic');
const btn = document.getElementById('musicToggle');
let playing = false;

function onPlaySuccess(){
btn.textContent = '🎵';
btn.style.animation = 'none';
playing = true;
}

function startMusic(){
if(!playing){
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

function toggleMusic(){
if(playing){
audio.pause();
btn.textContent = '🔇';
btn.style.animation = 'musicBounce 1.4s ease-in-out infinite';
playing = false;
}else{
audio.play().then(onPlaySuccess).catch(()=>{});
}
}

// Coba autoplay duluan saat halaman dibuka (berhasil di sebagian browser)
window.addEventListener('load', startMusic);

// Kalau autoplay diblokir, musik tetap mulai begitu ada klik pertama
document.addEventListener('click', startMusic, { once:true });
</script>
</body>
</html>
