<!DOCTYPE html>
<html>

<title>Mewarnai DeerBee</title>

</head>
<body>
<h1>🎨 Mewarnai DeerBee</h1>

<div class="card">
<h2>🐝 Lebah Lucu</h2>
<p>Segera hadir</p>
</div>

<div class="card">
<h2>🌈 Pelangi Ceria</h2>
<p>Segera hadir</p>
</div>

<div class="card">
<h2>🐰 Kelinci Imut</h2>
<p>Segera hadir</p>
</div>

<a class="btn-back" href="index.html">⬅ Kembali</a>

<audio id="bgMusic" src="assets/musik/bgm.mp3" loop></audio>
<button id="musicToggle" onclick="toggleMusic()">🔇</button>

<script>
const audio = document.getElementById('bgMusic');
const btn = document.getElementById('musicToggle');
let playing = false;

function startMusic(){
if(!playing){
audio.play();
btn.textContent = '🎵';
playing = true;
}
}

function toggleMusic(){
if(playing){
audio.pause();
btn.textContent = '🔇';
playing = false;
}else{
audio.play();
btn.textContent = '🎵';
playing = true;
}
}

document.addEventListener('click', startMusic, { once:true });
</script>
</body>
</html>
