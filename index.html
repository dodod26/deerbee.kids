<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerBee Kids Club</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

<style>
    {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Baloo 2',cursive;

    background-image:url('assets/background/bg.png');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    margin:0;
    padding:20px;

    box-sizing:border-box;
}

/* KOTAK UTAMA */

.container{
    width:calc(100% - 40px);

    max-width:700px;

    margin:20px auto;

    padding:25px;

    background:rgba(255,255,255,0.92);

    border-radius:25px;

    box-shadow:0 5px 20px rgba(0,0,0,.15);

    box-sizing:border-box;
}

/* LOGO */

.logo{
    animation:float 4s ease-in-out infinite;
}

/* LOGO NAIK TURUN */

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0);
    }
}

/* JUDUL */

h1{
    color:#ff69b4;
    text-align:center;

    animation:pulse 3s infinite;
}

/* JUDUL BERKEDIP PELAN */

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

p{
    text-align:center;
    color:#555;
}

/* TOMBOL */

.menu{

    display:block;

    width:85%;

    max-width:420px;

    margin:15px auto;

    padding:18px;

    background:white;

    border-radius:20px;

    text-decoration:none;

    font-size:22px;

    font-weight:bold;

    color:#444;

    box-shadow:0 4px 15px rgba(0,0,0,.12);

    transition:.3s;
}

/* EFEK HOVER */

.menu:hover{

    transform:scale(1.05);

    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.footer{

    text-align:center;

    margin-top:40px;

    color:#777;
}

.social{

    text-decoration:none;

    margin:0 10px;

    font-size:18px;
}
    /* KHUSUS HP */

@media (max-width:768px){

.logo{
width:220px;
}

h1{
font-size:38px;
}

p{
font-size:20px;
}

.menu{
width:90%;
font-size:26px;
padding:22px;
}

.footer{
font-size:18px;
}

}

</style>

</head>

<body>
