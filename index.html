<style>

body{
    font-family:'Baloo 2',cursive;
    background:#fff8e8;
    margin:0;
    padding:20px;
}

/* KOTAK UTAMA */

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

/* LOGO */

.logo{
    animation:float 3s ease-in-out infinite;
}

/* ANIMASI LOGO */

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
}

/* JUDUL */

h1{
    color:#ff69b4;
    text-align:center;
    animation:bounce 2s infinite;
}

/* ANIMASI JUDUL */

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-5px);}
}

/* PARAGRAF */

p{
    text-align:center;
    color:#555;
}

/* TOMBOL MENU */

.menu{
    display:block;
    max-width:300px;
    margin:15px auto;
    padding:18px;

    background:white;

    border-radius:20px;

    text-decoration:none;

    font-size:22px;
    font-weight:bold;

    color:#444;

    box-shadow:0 4px 15px rgba(0,0,0,.12);

    transition:0.3s;
}

/* EFEK SAAT DISENTUH */

.menu:hover{
    transform:scale(1.05);
}

/* FOOTER */

.footer{
    margin-top:40px;
    text-align:center;
    color:#777;
    font-size:14px;
}

</style>

</head>
